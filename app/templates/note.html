<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python学习助手:笔记</title>
    <link rel="stylesheet" href="../static/css/main.css">
    <link rel="stylesheet" href="../static/css/index.css">
    <link rel="stylesheet" href="../static/css/element-plus.css">
    <link rel="stylesheet" href="../static/css/header.css">
    <link rel="stylesheet" href="../static/css/code.css">
    <script src="../static/js/vue.global.js"></script>
    <script src="../static/js/element-plus.global.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="../static/js/axios.min.js"></script>
    <script src="https://cdn.bootcss.com/jquery/1.11.3/jquery.min.js"></script>

    <!-- Editor.md 依赖，按正确顺序加载 -->
    <script src="../static/editormd/lib/marked.min.js"></script>
    <script src="../static/editormd/lib/prettify.min.js"></script>
    <script src="../static/editormd/lib/raphael.min.js"></script>
    <script src="../static/editormd/lib/underscore.min.js"></script>
    <script src="../static/editormd/lib/sequence-diagram.min.js"></script>
    <script src="../static/editormd/lib/flowchart.min.js"></script>
    <script src="../static/editormd/lib/jquery.flowchart.min.js"></script>

    <!-- Editor.md 样式和主文件 -->
    <link rel="stylesheet" href="../static/editormd/css/editormd.css" />
    <script src="../static/editormd/editormd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" rel="stylesheet">
    <!-- markdown-it -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
    <!-- texmath（支持 KaTeX） -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.min.js"></script>
    <!-- katex 本体和样式 -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/css/texmath.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>

    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
            /* 禁止全页面滚动条 */
        }

        .note-container {
            display: flex;
            height: calc(100vh - 60px);
            overflow-y: hidden;
        }

        .note-sidebar {
            width: 280px;
            border-right: 1px solid #dcdfe6;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .note-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .note-toolbar {
            padding: 10px;
            border-bottom: 1px solid #dcdfe6;
        }

        .note-filter {
            padding: 10px;
            border-bottom: 1px solid #dcdfe6;
        }

        .note-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .note-empty {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #909399;
        }

        .note-empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .note-header {
            padding: 15px;
            border-bottom: 1px solid #dcdfe6;
        }

        .note-editor {
            flex: 1;
            overflow: hidden;
        }

        .note-preview {
            padding: 20px;
            overflow-y: auto;
            height: 100%;
            box-sizing: border-box;
        }

        .note-item {
            cursor: pointer;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .note-item:hover {
            background-color: #f5f7fa;
        }

        .note-item.active {
            background-color: #ecf5ff;
            color: #409eff;
        }

        .note-item-title {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .note-item-abstract {
            font-size: 12px;
            color: #909399;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #909399;
            margin-top: 5px;
        }

        .note-md-editor {
            height: 100%;
            width: 100%;
            border: none;
            resize: none;
            outline: none;
            padding: 20px;
            font-family: monospace;
        }

        .tag-item {
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .top-icon {
            color: #e6a23c;
            margin-right: 5px;
        }

        .collection-icon {
            color: #f56c6c;
            margin-right: 5px;
        }

        .editormd-container {
            height: 100%;
        }

        .editormd {
            height: 100% !important;
            margin-bottom: 0;
            border: none;
        }

        .editormd-preview {
            padding: 20px;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div id="app" style="overflow-y: hidden;">
        <!-- 页面顶部导航栏 -->
        <div class="header">
            <div class="nav-container">
                <div class="logo">Python学习助手</div>
                <el-menu mode="horizontal" :default-active="currentPage" router class="nav-menu">
                    <el-menu-item index="/homepage" @click="navigateTo('/homepage')">
                        <el-icon><el-icon-house /></el-icon>主页
                    </el-menu-item>
                    <el-menu-item index="/learn" @click="navigateTo('/learn')">
                        <el-icon><el-icon-reading /></el-icon>学习
                    </el-menu-item>
                    <el-menu-item index="/note" @click="navigateTo('/note')">
                        <el-icon><el-icon-notebook /></el-icon>笔记
                    </el-menu-item>
                    <el-menu-item index="/code" @click="navigateTo('/code')">
                        <el-icon><el-icon-terminal /></el-icon>代码
                    </el-menu-item>
                    <el-menu-item index="/user" @click="navigateTo('/user')">
                        <el-icon><el-icon-user /></el-icon>个人
                    </el-menu-item>
                </el-menu>
            </div>
        </div>

        <!-- 笔记系统容器 -->
        <div class="note-container" style="overflow-y:hidden;">
            <!-- 左侧边栏 -->
            <div class="note-sidebar">
                <div class="note-toolbar">
                    <el-row :gutter="10">
                        <el-col :span="12">
                            <el-button type="primary" @click="createNote" :icon="Plus" size="small"
                                style="width: 100%">新建笔记</el-button>
                        </el-col>
                        <el-col :span="12">
                            <el-upload ref="upload" action="/api/note/import" :show-file-list="false"
                                :on-success="handleImportSuccess" :before-upload="beforeMdUpload" accept=".md">
                                <el-button size="small" style="width: 100%">导入MD</el-button>
                            </el-upload>
                        </el-col>
                    </el-row>
                    <el-input v-model="searchQuery" placeholder="搜索笔记" prefix-icon="Search" clearable size="small"
                        style="margin-top: 10px"></el-input>
                </div>

                <div class="note-filter">
                    <el-row :gutter="10">
                        <el-col :span="12">
                            <el-select v-model="filters.state" placeholder="笔记状态" clearable size="small"
                                style="width: 100%">
                                <el-option label="编辑中" value="editing"></el-option>
                                <el-option label="已完成" value="completed"></el-option>
                            </el-select>
                        </el-col>
                        <el-col :span="12">
                            <el-select v-model="filters.top" placeholder="置顶状态" clearable size="small"
                                style="width: 100%">
                                <el-option label="置顶" :value="1"></el-option>
                                <el-option label="未置顶" :value="0"></el-option>
                            </el-select>
                        </el-col>
                    </el-row>
                    <el-row :gutter="10" style="margin-top: 10px">
                        <el-col :span="24">
                            <el-select v-model="filters.tags" multiple collapse-tags placeholder="标签筛选" clearable
                                size="small" style="width: 100%">
                                <el-option v-for="tag in allTags" :key="tag" :label="tag" :value="tag"></el-option>
                            </el-select>
                        </el-col>
                    </el-row>
                </div>
                {% raw %}
                <div class="note-list">
                    <div v-for="note in filteredNotes" :key="note.nid" class="note-item"
                        :class="{active: currentNote && currentNote.nid === note.nid}" @click="selectNote(note)">
                        <div class="note-item-title">
                            <el-icon v-if="note.top" class="top-icon">
                                <Star />
                            </el-icon>
                            {{ note.title || '无标题' }}
                        </div>
                        <div class="note-item-abstract">{{ note.abstract || '无摘要' }}</div>
                        <div class="note-item-meta">
                            <div>{{ formatDate(note.update) }}</div>
                            <div>
                                <el-tag size="small" :type="note.state === 'editing' ? 'warning' : 'success'">
                                    {{ note.state === 'editing' ? '编辑中' : '已完成' }}
                                </el-tag>
                            </div>
                        </div>
                    </div>
                </div>
                {% endraw %}
            </div>

            <!-- 右侧内容区 -->
            <div class="note-content">
                <!-- 空状态 -->
                <div v-if="!currentNote" class="note-empty">
                    <el-icon class="note-empty-icon">
                        <Document />
                    </el-icon>
                    <p>暂无选中笔记</p>
                    <el-button type="primary" @click="createNote">创建新笔记</el-button>
                </div>

                <!-- 笔记内容 -->
                <template v-else>
                    <!-- 笔记头部 -->
                    <div class="note-header">
                        <el-row :gutter="20">
                            <el-col :span="16">
                                <el-input v-model="currentNote.title" placeholder="请输入标题"
                                    :disabled="viewMode && currentNote.state === 'completed'"></el-input>
                            </el-col>
                            <el-col :span="8">
                                <el-button-group>
                                    <el-button v-if="currentNote.state === 'completed'"
                                        :type="viewMode ? 'primary' : 'default'" @click="viewMode = true"
                                        :icon="View">预览</el-button>
                                    <el-button :type="!viewMode ? 'primary' : 'default'" @click="viewMode = false"
                                        :icon="Edit">编辑</el-button>
                                    <el-button type="danger" @click="deleteNoteConfirm" :icon="Delete"></el-button>
                                </el-button-group>
                            </el-col>
                        </el-row>

                        <!-- 只在编辑模式下或笔记状态为"编辑中"时展示以下内容 -->
                        <template v-if="!viewMode || currentNote.state !== 'completed'">
                            <el-row style="margin-top: 15px">
                                <el-col :span="24">
                                    <el-input v-model="currentNote.abstract" placeholder="请输入摘要"
                                        :disabled="viewMode && currentNote.state === 'completed'" type="textarea"
                                        :rows="2"></el-input>
                                </el-col>
                            </el-row>

                            <el-row :gutter="10" style="margin-top: 15px">
                                <el-col :span="8">
                                    <el-select v-model="currentNote.state" placeholder="状态"
                                        :disabled="viewMode && currentNote.state === 'completed'" style="width: 100%">
                                        <el-option label="编辑中" value="editing"></el-option>
                                        <el-option label="已完成" value="completed"></el-option>
                                    </el-select>
                                </el-col>
                                <el-col :span="8">
                                    <el-switch v-model="currentNote.top" :active-value="1" :inactive-value="0"
                                        active-text="置顶" inactive-text="不置顶"
                                        :disabled="viewMode && currentNote.state === 'completed'"></el-switch>
                                </el-col>
                                <el-col :span="8">
                                    <el-rate v-model="currentNote.collection" :max="5"
                                        :disabled="viewMode && currentNote.state === 'completed'"></el-rate>
                                </el-col>
                            </el-row>

                            <el-row style="margin-top: 15px">
                                <el-col :span="24">
                                    {% raw %}
                                    <el-tag v-for="tag in currentNote.tag" :key="tag" closable
                                        :disable-transitions="false" @close="removeTag(tag)" class="tag-item"
                                        :disabled="viewMode && currentNote.state === 'completed'">
                                        {{ tag }}
                                    </el-tag>
                                    {% endraw %}
                                    <el-input v-if="inputTagVisible" ref="tagInputRef" v-model="inputTagValue"
                                        class="tag-input" size="small" @keyup.enter="confirmTag" @blur="confirmTag"
                                        style="width: 90px"></el-input>
                                    <el-button v-else-if="!(viewMode && currentNote.state === 'completed')"
                                        class="button-new-tag" size="small" @click="showTagInput">
                                        + 添加标签
                                    </el-button>
                                </el-col>
                            </el-row>

                            <el-row style="margin-top: 15px">
                                <el-col :span="24">
                                    <el-button type="primary" @click="saveNote" :loading="saving"
                                        :disabled="viewMode && currentNote.state === 'completed'">保存笔记</el-button>
                                </el-col>
                            </el-row>
                        </template>
                    </div>
                    <!-- 笔记编辑区 -->
                    <div class="note-editor">
                        <!-- 预览模式 -->
                        <div v-if="viewMode" class="note-preview" v-html="renderedContent"></div>

                        <!-- 编辑模式 -->
                        <div v-else id="editormd" style="height: 100%;"></div>
                    </div>

                </template>
            </div>
        </div>
    </div>

    <!-- 库检查脚本 -->
    <script src="../static/js/check-libraries.js"></script>

    <!-- 笔记系统JS -->
    <script src="../static/js/note/note.js"></script>
</body>

</html>
