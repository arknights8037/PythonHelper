<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>python学习助手：登录</title>

  <!-- CSS文件 -->
  <link rel="stylesheet" href="../static/css/main.css">
  <link rel="stylesheet" href="../static/css/index.css">
  <link rel="stylesheet" href="../static/css/element-plus.css">

  <!-- Vue 3 -->
  <script src="../static/js/vue.global.js"></script>

  <!-- Element Plus -->
  <script src="../static/js/element-plus.global.js"></script>

  <!-- Axios -->
  <script src="../static/js/axios.min.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
</head>
<style>
  body {
      background-color: #f5f5f5;
      background: url("/static/img/background.png") no-repeat center center fixed;
      background-size: cover;
  }

  .container {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      height: 100vh;
      padding-right: 50px;
  }

  .panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      width: 300px;
  }

  .header {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
  }

  .el-button {
      display: flex;
      justify-content: center;
      width: 100%;
  }

  .line-input {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #ccc;
      padding: 10px 0;
      margin-bottom: 20px;
  }

  .line-input input {
      flex-grow: 1;
      border: none;
      outline: none;
      padding: 5px;
      background: none;
  }

  .line-input input::placeholder {
      color: #aaa;
  }
</style>
<body>
  <div id="app">
    <div class="container">
      <div class="panel">
        <div class="header">
          <el-segmented v-model="activePanel" :options="['登录', '注册']" round />
        </div>
        <template v-if="activePanel === '登录'">
          <div class="line-input">
            <el-icon>
              <user />
            </el-icon>
            <input v-model="loginForm.uid" type="text" placeholder="用户名">
          </div>
          <div class="line-input">
            <el-icon>
              <lock />
            </el-icon>
            <input v-model="loginForm.password" type="password" placeholder="密码">
          </div>
          <el-checkbox v-model="loginForm.rememberMe">记住密码</el-checkbox>
          <el-button type="text" style="float: right;">忘记密码?</el-button>
          <el-button type="primary" @click="submitLogin" round>登录</el-button>
        </template>
        <template v-else>
          <div class="line-input">
            <el-icon>
              <user />
            </el-icon>
            <input v-model="registerForm.uid" type="text" placeholder="用户名">
          </div>
          <div class="line-input">
            <el-icon>
              <postcard />
            </el-icon>
            <input v-model="registerForm.nickname" type="text" placeholder="昵称">
          </div>
          <div class="line-input">
            <el-icon>
              <lock />
            </el-icon>
            <input v-model="registerForm.password" type="text" placeholder="密码">
          </div>
          <div class="line-input">
            <el-icon>
              <check />
            </el-icon>
            <input v-model="registerForm.confirmPassword" type="text" placeholder="确认密码">
          </div>
          <el-button type="primary" @click="submitRegister" round>注册</el-button>
        </template>
      </div>
    </div>
  </div>


  <!-- 引入登录/注册JS -->
  <script src="../static/js/login/login.js"></script>
</body>

</html>
