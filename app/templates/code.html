<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python学习助手:代码</title>
    <link rel="stylesheet" href="../static/css/main.css">
    <link rel="stylesheet" href="../static/css/index.css">
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../static/css/header.css">
    <link rel="stylesheet" href="../static/css/code.css">
    <script src="../static/js/vue.global.js"></script>
    <script src="../static/js/element-plus.global.js"></script>
    <script>
        window.process = { env: { NODE_ENV: 'production' } };
    </script>
    <script src="https://unpkg.com/vue-element-plus-x@1.1.6/dist/umd/index.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="../static/js/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.js"></script>
    <script src="https://unpkg.com/stackedit-js@1.0.7/docs/lib/stackedit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
</head>


<body>
    <div id="app">
        <!-- 页面顶部导航栏 -->
        <div class="header">
            <div class="nav-container">
                <div class="logo">Python学习助手</div>
                <el-menu mode="horizontal" :default-active="currentPage" router class="nav-menu">
                    <el-menu-item index="/homepage" @click="navigateTo('/homepage')">
                        <el-icon><el-icon-house /></el-icon>主页
                    </el-menu-item>
                    <el-menu-item index="/learn" @click="navigateTo('/learn')">
                        <el-icon><el-icon-reading /></el-icon>学习
                    </el-menu-item>
                    <el-menu-item index="/note" @click="navigateTo('/note')">
                        <el-icon><el-icon-notebook /></el-icon>笔记
                    </el-menu-item>
                    <el-menu-item index="/code" @click="navigateTo('/code')">
                        <el-icon><el-icon-terminal /></el-icon>代码
                    </el-menu-item>
                    <el-menu-item index="/user" @click="navigateTo('/user')">
                        <el-icon><el-icon-user /></el-icon>个人
                    </el-menu-item>
                </el-menu>
            </div>
        </div>

        <!-- 代码页面布局 -->
        <div class="code-container">
            <!-- 折叠按钮 -->
            <el-button class="collapse-btn" :class="{ 'collapsed': fileListCollapsed }" circle size="small"
                @click="toggleFileList">
                <el-icon v-if="fileListCollapsed"><el-icon-arrow-right /></el-icon>
                <el-icon v-else><el-icon-arrow-left /></el-icon>
            </el-button>

            <!-- 文件列表 -->
            <div class="file-list" :class="{ 'collapsed': fileListCollapsed }">

                <el-input v-model="fileSearchText" placeholder="搜索文件..." prefix-icon="el-icon-search" size="small"
                    style="margin: 10px;" clearable></el-input>

                <div style="text-align: center; padding: 20px;" v-show="files.length === 0">
                    暂无文件
                </div>

                <div v-show="files.length > 0">
                    {% raw %}
                    <div v-for="(file, index) in filteredFiles" :key="file.id" class="file-item"
                        :class="{ 'active': activeFile === file.id }" @click="selectFile(file.id)">
                        <div class="python-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 0C5.372 0 6.61 3.033 6.61 3.033L6.629 6.223H12.2v.896H4.092S0 6.605 0 13.092c0 6.488 3.774 6.308 3.774 6.308h2.254v-3.046S5.91 13.573 9.432 13.573h4.156s2.295.019 2.295-2.265V4.203S16.475 0 12 0zm-3.328 2.154a1.216 1.216 0 0 1 1.216 1.216 1.216 1.216 0 0 1-1.216 1.213 1.216 1.216 0 0 1-1.216-1.213 1.216 1.216 0 0 1 1.216-1.216z"
                                    fill="#3572A5" />
                                <path
                                    d="M12.001 24c6.628 0 5.39-3.033 5.39-3.033l-.018-3.19H11.8v-.896h8.107S24 17.395 24 10.908c0-6.488-3.774-6.308-3.774-6.308h-2.254v3.046s.12 2.781-3.401 2.781H10.41s-2.295-.019-2.295 2.265v7.105S7.527 24 12.001 24zm3.328-2.154a1.216 1.216 0 0 1-1.216-1.216 1.216 1.216 0 0 1 1.216-1.213 1.216 1.216 0 0 1 1.216 1.213 1.216 1.216 0 0 1-1.216 1.216z"
                                    fill="#FFD43B" />
                            </svg>
                        </div>
                        <span class="file-name">{{ file.name }}</span>
                        <div class="file-actions" @click.stop>
                            <el-dropdown trigger="click">
                                <span class="el-dropdown-link">
                                    <el-icon>
                                        <more />
                                    </el-icon>
                                </span>
                                <template #dropdown>
                                    <el-dropdown-menu>
                                        <el-dropdown-item @click="renameFile(file)">重命名</el-dropdown-item>
                                        <el-dropdown-item @click="confirmDeleteFile(file)">删除</el-dropdown-item>
                                    </el-dropdown-menu>
                                </template>
                            </el-dropdown>
                        </div>
                    </div>
                    {% endraw %}
                </div>

                <div style="padding: 10px; text-align: center;">
                    <el-button type="primary" size="small" @click="createNewFile">
                        新建文件
                    </el-button>
                </div>
            </div>

            <!-- 主内容区域 -->
            <div class="main-content">
                <!-- AI对话区域 -->
                <div class="chat-area" ref="chatArea">
                    <div class="messages-container">
                        <bubble-list :list="messages" :max-height="'600px'" :always-show-scrollbar="false"
                            :show-back-button="true" :btn-loading="true" :btn-color="'#409EFF'" :btn-icon-size="24"
                            :trigger-indices="'only-last'">
                            <template #bubble="{ item }">
                                <bubble :type="item.type" :is-markdown="item.isMarkdown ?? (item.type === 'ai')"
                                    :typing="item.typing ?? (item.type === 'ai' ? { step: 2, interval: 50, suffix: '|' } : undefined)">
                                    <template #avatar>
                                        <img :src="item.type === 'user' ? userAvatar : aiAvatar"
                                            class="bubble-avatar" />
                                    </template>
                                    <div v-if="item.type === 'user'" v-html="item.content"></div>
                                    <div v-else v-html="item.content"></div>
                    </div>
                    </bubble>
                    </template>
                    </bubble-list>
                </div>

                <div class="chat-input-container">
                    <!-- 输入框 -->
                    <mention-sender v-model="chatInput" :loading="chatLoading" placeholder="输入您的Python相关问题..."
                        :auto-size="{ minRows: 1, maxRows: 5 }" clearable allow-speech @send="sendMessage">
                    </mention-sender>
                    <!-- 下方功能区 -->
                    <div class="chat-input-extra-row"
                        style="display: flex; align-items: center; gap: 16px; margin-top: 8px;">
                        
                        <el-button type="primary" :loading="chatLoading" :disabled="!chatInput.trim()"
                            @click="sendMessage">发送</el-button>
                    </div>
                </div>
            </div>

            <!-- 调整两个区域比例的手柄 -->
            <div class="resizer" ref="horizontalResizer" @mousedown="startHorizontalResize"></div>


            <!-- 代码区域 -->
            <div class="code-area" ref="codeArea">
                <!-- 代码编辑器 -->
                <div class="code-editor" ref="codeEditor"></div>

                <!-- 水平调整手柄 -->
                <div class="vertical-resizer" ref="verticalResizer" @mousedown="startVerticalResize"></div>

                <!-- 代码输出区域 -->
                <div class="code-output" ref="codeOutput">
                    <!-- 竖向分段控制器 -->
                    <div class="vertical-tabs">
                        {% raw %}
                        <div v-for="(tab, index) in outputTabs" :key="index" class="vertical-tab-item"
                            :class="{ 'active': activeOutputTab === tab.id }" @click="switchOutputTab(tab.id)">
                            {{ tab.icon }}
                        </div>
                        {% endraw %}
                    </div>

                    <!-- 输出内容区域 -->
                    <div class="output-content">
                        <div v-show="activeOutputTab === 'console'" class="console-output-container">
                            <div class="console-toolbar">
                                <el-button type="success" size="small" icon="CaretRight" @click="runCode()">
                                    运行
                                </el-button>
                                <el-button type="primary" size="small" icon="Document" @click="saveFile()">
                                    保存
                                </el-button>
                                <el-button type="info" size="small" icon="DataAnalysis" @click="analyzeComplexity()">
                                    复杂度分析
                                </el-button>
                                <el-button type="warning" size="small" icon="Check" @click="codeReview()">
                                    代码评审
                                </el-button>
                                <el-button type="success" size="small" icon="Document" @click="explainCode()">
                                    解释代码
                                </el-button>
                            </div>
                            <div class="console-output terminal-style">
                                <pre id="outputPre">{{ consoleOutput }}</pre>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- 保存文件对话框 -->
    <el-dialog v-model="saveDialogVisible" title="保存文件" width="30%">
        <el-form :model="saveForm">
            <el-form-item label="文件名">
                <el-input v-model="saveForm.filename" placeholder="请输入文件名"></el-input>
            </el-form-item>
        </el-form>
        <template #footer>
            <span class="dialog-footer">
                <el-button @click="saveDialogVisible = false">取消</el-button>
                <el-button type="primary" @click="saveFile">确认</el-button>
            </span>
        </template>
    </el-dialog>

    <!-- 重命名文件对话框 -->
    <el-dialog v-model="renameDialogVisible" title="重命名文件" width="30%">
        <el-form :model="renameForm">
            <el-form-item label="新文件名">
                <el-input v-model="renameForm.newFilename" placeholder="请输入文件名"></el-input>
            </el-form-item>
        </el-form>
        <template #footer>
            <span class="dialog-footer">
                <el-button @click="renameDialogVisible = false">取消</el-button>
                <el-button type="primary" @click="confirmRename">确认</el-button>
            </span>
        </template>
    </el-dialog>

    <!-- 删除文件确认对话框 -->
    <el-dialog v-model="deleteDialogVisible" title="删除确认" width="30%" :close-on-click-modal="false"
        :close-on-press-escape="false" destroy-on-close>
        {% raw %}
        <p style="margin-bottom: 20px;">确定要删除文件 "{{ fileToDelete ? fileToDelete.name : '' }}" 吗？此操作不可恢复。</p>
        {% endraw %}
        <template #footer>
            <span class="dialog-footer">
                <el-button @click="deleteDialogVisible = false">取消</el-button>
                <el-button type="danger" @click="deleteFile">确认删除</el-button>
            </span>
        </template>
    </el-dialog>


    <!-- 库检查脚本 -->

    <script src="../static/js/codes/code.js"></script>


</body>

</html>
